{% extends 'Ejercicio2App/base.html' %}
{% block title %}Eliminar proyecto{% endblock %}

{% block content %}
<div class="confirm-center">
    <div class="confirm-box">
        <div class="stamp">
            <span class="stamp-icon">!</span>
        </div>
        <h1>¿ELIMINAR?</h1>
        <p>
            Estás a punto de eliminar el proyecto<br>
            <strong>{{ object.titulo }}</strong><br>
            Esta acción no se puede deshacer.
        </p>
        <form method="post">
            {% csrf_token %}
            <div class="btn-row" style="justify-content: center;">
                <button type="submit" class="btn btn-danger">Sí, eliminar</button>
                <a href="{% url 'proyecto-list' %}" class="btn btn-secondary">Cancelar</a>
            </div>
        </form>
    </div>
</div>
{% endblock %}
